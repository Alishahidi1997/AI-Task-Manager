# Optional paid OpenAI golden eval — does not run on push/PR (see ci.yml).
# Requires repository secret OPENAI_API_KEY.
name: Live planner eval

on:
  workflow_dispatch:
    inputs:
      min_tool_accuracy:
        description: Minimum tool accuracy (0–1)
        required: false
        default: "0.80"
      min_param_accuracy:
        description: Minimum parameter accuracy (0–1)
        required: false
        default: "0.70"

jobs:
  eval-live:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Live OpenAI golden eval
        env:
          DISABLE_SCHEDULER: "1"
          JWT_SECRET_KEY: ci-jwt-secret
          EVAL_LIVE: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_LIVE_TOOL_ACCURACY_MIN: ${{ inputs.min_tool_accuracy }}
          EVAL_LIVE_PARAM_ACCURACY_MIN: ${{ inputs.min_param_accuracy }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::Set repository secret OPENAI_API_KEY to run live evals"
            exit 1
          fi
          python -m pytest tests/test_planner_evals.py::test_golden_suite_live_openai \
            -q --tb=short -m live_openai -o addopts=
